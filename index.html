<!doctype html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Astro Drift QA Lab</title>
</head>

<body>
  <main id="app">
    <section class="game-shell" aria-label="Astro Drift game">
      <div class="game-header">
        <div>
          <p class="eyebrow">Astro Drift QA Lab</p>
          <h1>Astro Drift</h1>
        </div>

        <p class="status-pill">Prototype</p>
      </div>

      <canvas id="game-canvas" width="960" height="540" aria-label="Astro Drift game canvas"
        data-testid="game-canvas"></canvas>

      <p class="controls-hint">
        Move with Arrow Keys or WASD. Survive as long as possible. Restart with R, Enter or Space.
      </p>
    </section>
  </main>

  <script type="module" src="/src/main.ts"></script>
</body>

</html>
