<!doctype html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Astro Drift QA Lab</title>
</head>

<body>
  <main id="app">
    <section class="game-shell" aria-label="Astro Drift game">
      <div class="game-header">
        <div>
          <p class="eyebrow">Astro Drift QA Lab</p>
          <h1>Astro Drift</h1>
        </div>

        <p class="status-pill">Prototype</p>
      </div>

      <canvas id="game-canvas" width="960" height="540" aria-label="Astro Drift game canvas"
        data-testid="game-canvas"></canvas>

      <div
        class="visually-hidden"
        aria-live="polite"
        aria-label="Current game status"
        data-testid="game-status-panel"
      >
        <p>
          Status:
          <span data-testid="game-status">idle</span>
        </p>
        <p>
          Score:
          <span data-testid="game-score">00000</span>
        </p>
        <p>
          Time:
          <span data-testid="game-time">0s</span>
        </p>
        <p>
          Asteroids:
          <span data-testid="asteroid-count">0</span>
        </p>
      </div>

      <p class="controls-hint">
        Press Enter or Space to start. Move with Arrow Keys or WASD. Restart with R.
      </p>
    </section>
  </main>

  <script type="module" src="/src/main.ts"></script>
</body>

</html>
