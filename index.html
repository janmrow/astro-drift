<!doctype html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Astro Drift</title>
</head>

<body>
  <main id="app">
    <h1 class="visually-hidden">Astro Drift</h1>

    <section class="game-shell" aria-label="Astro Drift game">
      <canvas id="game-canvas" width="960" height="540" aria-label="Astro Drift game canvas"
        aria-describedby="game-controls" data-testid="game-canvas"></canvas>

      <p class="frame-label">CHART WINDOW · SECTOR 17</p>

      <p id="game-controls" class="visually-hidden">
        Press Enter to start or restart. Use the Up and Down Arrow keys to move.
      </p>

      <div
        class="visually-hidden"
        aria-live="polite"
        aria-label="Current game status"
        data-testid="game-status-panel"
      >
        <p>
          Status:
          <span data-testid="game-status">idle</span>
        </p>
      </div>

      <div class="visually-hidden" aria-label="Current game stats" data-testid="game-stats-panel">
        <p>
          Score:
          <span data-testid="game-score">00000</span>
        </p>
        <p>
          Time:
          <span data-testid="game-time">0s</span>
        </p>
        <p>
          Asteroids:
          <span data-testid="asteroid-count">0</span>
        </p>
      </div>

    </section>
  </main>

  <script type="module" src="/src/main.ts"></script>
</body>

</html>
